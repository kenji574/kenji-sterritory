<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滨华中学保卫战</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#111;
    font-family:"Microsoft YaHei";
}

canvas{
    display:block;
    background:#2e5330;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:100;
    background:rgba(0,0,0,0.45);
    padding:14px;
    border-radius:12px;
    min-width:300px;
    backdrop-filter:blur(5px);
}

.bar{
    width:240px;
    height:20px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

#hpBar{
    height:100%;
    width:100%;
    background:linear-gradient(to right,#00e676,#00c853);
}

#bossBar{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    height:28px;
    background:#222;
    border:3px solid white;
    border-radius:14px;
    overflow:hidden;
    display:none;
    z-index:200;
}

#bossHp{
    width:100%;
    height:100%;
    background:linear-gradient(to right,#ff1744,#b71c1c);
}

#tips{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    background:rgba(0,0,0,0.5);
    padding:10px 18px;
    border-radius:12px;
    font-size:16px;
}

#victory{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.7);
    color:white;
    font-size:50px;
    z-index:500;
    text-align:center;
}

#victory span{
    font-size:24px;
    margin-top:20px;
    color:#ffd54f;
}
</style>
</head>

<body>

<div id="ui">
<div>❤️ 生命值</div>

<div class="bar">
<div id="hpBar"></div>
</div>

<div id="info" style="margin-top:12px;line-height:1.7">
关卡：1<br>
武器：手枪<br>
击败：0
</div>
</div>

<div id="bossBar">
<div id="bossHp"></div>
</div>

<div id="tips">
WASD移动 ｜ 鼠标射击 ｜ R换弹 ｜ 1/2/3/4切枪
</div>

<div id="victory">
🎆 感谢你保护滨华中学！ 🎆
<span>和平终于恢复了</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const keys={};
const mouse={x:0,y:0,down:false};

document.addEventListener("keydown",e=>{
    keys[e.code]=true;
});

document.addEventListener("keyup",e=>{
    keys[e.code]=false;
});

canvas.addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

canvas.addEventListener("mousedown",()=>{
    mouse.down=true;
});

canvas.addEventListener("mouseup",()=>{
    mouse.down=false;
});

// 武器系统
const weapons={

    pistol:{
        name:"手枪",
        damage:18,
        speed:4.8,
        fireRate:220,
        spread:0.02,
        ammo:12,
        maxAmmo:12,
        reload:900,
        bullets:1,
        color:"#ffd54f"
    },

    shotgun:{
        name:"霰弹枪",
        damage:14,
        speed:4.2,
        fireRate:700,
        spread:0.35,
        ammo:6,
        maxAmmo:6,
        reload:1600,
        bullets:6,
        color:"#ff7043"
    },

    rifle:{
        name:"突击步枪",
        damage:10,
        speed:3.8,
        fireRate:90,
        spread:0.08,
        ammo:30,
        maxAmmo:30,
        reload:1800,
        bullets:1,
        color:"#81c784"
    },

    sniper:{
        name:"狙击枪",
        damage:85,
        speed:3.1,
        fireRate:1200,
        spread:0.005,
        ammo:5,
        maxAmmo:5,
        reload:2300,
        bullets:1,
        color:"#90caf9"
    }
};

let currentWeapon="pistol";
let lastShot=0;
let reloading=false;

// 玩家
const player={
    x:500,
    y:400,
    radius:22,
    hp:100,
    maxHp:100
};

const bullets=[];
const enemies=[];
const particles=[];
const fireworks=[];

let kills=0;
let level=1;
let gameWin=false;

// Boss
const boss={
    active:false,
    x:canvas.width/2,
    y:120,
    radius:70,
    hp:2500,
    maxHp:2500,
    speed:0.6
};

// 切枪
document.addEventListener("keydown",e=>{

    if(e.key==="1") currentWeapon="pistol";
    if(e.key==="2") currentWeapon="shotgun";
    if(e.key==="3") currentWeapon="sniper";
    if(e.key==="4") currentWeapon="rifle";

    if(e.code==="KeyR"){
        reload();
    }
});

// 换弹
function reload(){

    if(reloading) return;

    let gun=weapons[currentWeapon];

    if(gun.ammo===gun.maxAmmo) return;

    reloading=true;

    setTimeout(()=>{
        gun.ammo=gun.maxAmmo;
        reloading=false;
    },gun.reload);
}

// 射击
function shoot(){

    let gun=weapons[currentWeapon];

    if(gun.ammo<=0){
        reload();
        return;
    }

    const now=Date.now();

    if(now-lastShot<gun.fireRate) return;

    lastShot=now;

    gun.ammo--;

    let angle=Math.atan2(
        mouse.y-player.y,
        mouse.x-player.x
    );

    for(let i=0;i<gun.bullets;i++){

        let spread=(Math.random()-0.5)*gun.spread;

        bullets.push({
            x:player.x,
            y:player.y,
            dx:Math.cos(angle+spread)*15,
            dy:Math.sin(angle+spread)*15,
            damage:gun.damage,
            color:gun.color,
            life:80
        });
    }
}

// 敌人生成
function spawnSmallZombie(){

    enemies.push({
        type:"small",
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        radius:18,
        hp:40,
        maxHp:40,
        speed:1.7,
        damage:0.18,
        color:"#66bb6a"
    });
}

function spawnNormalZombie(){

    enemies.push({
        type:"normal",
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        radius:28,
        hp:120,
        maxHp:120,
        speed:1.2,
        damage:0.35,
        color:"#c62828"
    });
}

// 粒子
function explosion(x,y,color){

    for(let i=0;i<20;i++){

        particles.push({
            x,y,
            dx:(Math.random()-0.5)*8,
            dy:(Math.random()-0.5)*8,
            size:Math.random()*5+2,
            color,
            life:35
        });
    }
}

// 烟花
function createFirework(){

    fireworks.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height/2,
        color:`hsl(${Math.random()*360},100%,60%)`,
        life:80
    });
}

// 更新
function update(){

    if(gameWin){

        if(Math.random()<0.1){
            createFirework();
        }

        return;
    }

    let gun=weapons[currentWeapon];

    // 移动速度受武器影响
    if(keys["KeyW"]) player.y-=gun.speed;
    if(keys["KeyS"]) player.y+=gun.speed;
    if(keys["KeyA"]) player.x-=gun.speed;
    if(keys["KeyD"]) player.x+=gun.speed;

    // 射击
    if(mouse.down){
        shoot();
    }

    // 子弹
    for(let i=0;i<bullets.length;i++){

        let b=bullets[i];

        b.x+=b.dx;
        b.y+=b.dy;
        b.life--;

        if(b.life<=0){

            bullets.splice(i,1);
            i--;
        }
    }

    // 僵尸
    for(let i=0;i<enemies.length;i++){

        let e=enemies[i];

        let angle=Math.atan2(
            player.y-e.y,
            player.x-e.x
        );

        e.x+=Math.cos(angle)*e.speed;
        e.y+=Math.sin(angle)*e.speed;

        let dist=Math.hypot(
            player.x-e.x,
            player.y-e.y
        );

        // 攻击玩家
        if(dist<45){

            player.hp-=e.damage;

            // 第二关普通僵尸吸血
            if(level>=2 && e.type==="normal"){

                e.hp+=e.maxHp*0.01;

                if(e.hp>e.maxHp){
                    e.hp=e.maxHp;
                }
            }

            if(player.hp<=0){

                alert("💀 游戏失败");
                location.reload();
            }
        }

        // 子弹碰撞
        for(let j=0;j<bullets.length;j++){

            let b=bullets[j];

            let d=Math.hypot(
                b.x-e.x,
                b.y-e.y
            );

            if(d<e.radius+4){

                e.hp-=b.damage;

                bullets.splice(j,1);

                explosion(b.x,b.y,b.color);

                if(e.hp<=0){

                    kills++;

                    explosion(e.x,e.y,"red");

                    enemies.splice(i,1);

                    break;
                }
            }
        }
    }

    // 第一关
    if(level===1){

        while(enemies.length<8){
            spawnSmallZombie();
        }

        if(kills>=50){

            level=2;
            kills=0;
            enemies.length=0;
        }
    }

    // 第二关
    if(level===2){

        while(enemies.length<10){
            spawnNormalZombie();
        }

        if(kills>=35){

            level=3;
            kills=0;
            enemies.length=0;

            boss.active=true;

            document.getElementById("bossBar").style.display="block";
        }
    }

    // Boss关
    if(level===3 && boss.active){

        let angle=Math.atan2(
            player.y-boss.y,
            player.x-boss.x
        );

        boss.x+=Math.cos(angle)*boss.speed;
        boss.y+=Math.sin(angle)*boss.speed;

        // Boss远程攻击
        if(Math.random()<0.015){

            bullets.push({
                x:boss.x,
                y:boss.y,
                dx:Math.cos(angle)*8,
                dy:Math.sin(angle)*8,
                damage:12,
                enemy:true,
                color:"#ff1744",
                life:120
            });
        }

        // Boss受击
        for(let i=0;i<bullets.length;i++){

            let b=bullets[i];

            if(b.enemy) continue;

            let d=Math.hypot(
                b.x-boss.x,
                b.y-boss.y
            );

            if(d<boss.radius){

                boss.hp-=b.damage;

                bullets.splice(i,1);

                explosion(boss.x,boss.y,"orange");

                if(boss.hp<=0){

                    boss.active=false;

                    document.getElementById("bossBar").style.display="none";

                    gameWin=true;

                    document.getElementById("victory").style.display="flex";
                }
            }
        }
    }

    // Boss每15秒刷怪
    if(level===3){

        if(Date.now()%15000<20){

            spawnSmallZombie();
            spawnNormalZombie();
        }
    }

    // Boss子弹伤害
    for(let b of bullets){

        if(!b.enemy) continue;

        let d=Math.hypot(
            b.x-player.x,
            b.y-player.y
        );

        if(d<25){

            player.hp-=0.6;

            if(player.hp<=0){

                alert("💀 被Boss击败");
                location.reload();
            }
        }
    }

    // 粒子
    for(let i=0;i<particles.length;i++){

        let p=particles[i];

        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;

        if(p.life<=0){

            particles.splice(i,1);
            i--;
        }
    }

    // 烟花
    for(let i=0;i<fireworks.length;i++){

        fireworks[i].life--;

        if(fireworks[i].life<=0){

            fireworks.splice(i,1);
            i--;
        }
    }

    updateUI();
}

// UI
function updateUI(){

    document.getElementById("hpBar").style.width=
        player.hp+"%";

    document.getElementById("info").innerHTML=
        `
        关卡：${level}<br>
        武器：${weapons[currentWeapon].name}<br>
        击败：${kills}
        `;

    if(boss.active){

        document.getElementById("bossHp").style.width=
            (boss.hp/boss.maxHp*100)+"%";
    }
}

// 绘制
function draw(){

    ctx.fillStyle="#355e3b";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 网格
    ctx.strokeStyle="rgba(255,255,255,0.04)";

    for(let x=0;x<canvas.width;x+=50){

        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();
    }

    for(let y=0;y<canvas.height;y+=50){

        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(canvas.width,y);
        ctx.stroke();
    }

    // 玩家
    const angle=Math.atan2(
        mouse.y-player.y,
        mouse.x-player.x
    );

    ctx.save();

    ctx.translate(player.x,player.y);
    ctx.rotate(angle);

    ctx.fillStyle="#29b6f6";

    ctx.beginPath();
    ctx.arc(0,0,22,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#222";
    ctx.fillRect(0,-5,40,10);

    ctx.restore();

    // 子弹
    for(let b of bullets){

        ctx.fillStyle=b.color;

        ctx.beginPath();
        ctx.arc(b.x,b.y,4,0,Math.PI*2);
        ctx.fill();
    }

    // 敌人
    for(let e of enemies){

        ctx.fillStyle=e.color;

        ctx.beginPath();
        ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
        ctx.fill();

        // 血条
        ctx.fillStyle="black";
        ctx.fillRect(e.x-20,e.y-28,40,5);

        ctx.fillStyle="lime";
        ctx.fillRect(
            e.x-20,
            e.y-28,
            e.hp/e.maxHp*40,
            5
        );
    }

    // Boss
    if(boss.active){

        ctx.fillStyle="#6a1b9a";

        ctx.beginPath();
        ctx.arc(boss.x,boss.y,boss.radius,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle="white";

        ctx.beginPath();
        ctx.arc(boss.x-18,boss.y-10,8,0,Math.PI*2);
        ctx.arc(boss.x+18,boss.y-10,8,0,Math.PI*2);
        ctx.fill();
    }

    // 粒子
    for(let p of particles){

        ctx.fillStyle=p.color;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    }

    // 烟花
    for(let f of fireworks){

        for(let i=0;i<25;i++){

            ctx.fillStyle=f.color;

            ctx.beginPath();

            ctx.arc(
                f.x + Math.cos(i)*Math.random()*60,
                f.y + Math.sin(i)*Math.random()*60,
                4,
                0,
                Math.PI*2
            );

            ctx.fill();
        }
    }
}

// 主循环
function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

// 开始
loop();
</script>

</body>
</html>
